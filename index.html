<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- ████ CUSTOMIZE: שנו את שם המשחק ████ -->
<title>מנחה | עבודה בטוחה עם חומ"ס</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;800;900&family=Secular+One&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --c0:#2E81C5;--c1:#78318E;--c2:#1a6b3a;--c3:#7a3b0e;
  --c4:#b5451b;--c5:#1a5276;--c6:#4a235a;--c7:#145a32;
  --green:#93C93E;--gold:#F6C90E;--dark:#0f0f1a;--pan:#1a0f2e;--pan2:#16213e;--white:#fff;
  --ok:#00CC6A;--err:#FF4444;--or:#FF6B00;--orl:#FF9A3C;
}
html,body{height:100%;overflow-x:hidden}
body{font-family:'Heebo',sans-serif;background:var(--dark);color:var(--white);direction:rtl;min-height:100vh}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at 20% 20%,rgba(46,129,197,.15),transparent 60%),
             radial-gradient(ellipse at 80% 80%,rgba(120,49,142,.15),transparent 60%);
  pointer-events:none;z-index:0}

/* ── LOBBY ── */
#lobby{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;padding:24px;text-align:center;gap:20px;overflow-y:auto}
.brand{font-size:11px;font-weight:800;letter-spacing:.3em;color:var(--green);text-transform:uppercase}
h1{font-family:'Secular One',sans-serif;font-size:clamp(36px,5vw,64px);line-height:1.1;
   background:linear-gradient(135deg,var(--orl),#fff 40%,#C084FC);
   -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.lobby-cols{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;width:100%;max-width:900px}
.card{background:var(--pan);border:1px solid rgba(147,51,234,.3);border-radius:20px;padding:22px;
      display:flex;flex-direction:column;align-items:center;gap:12px;flex:1;min-width:210px;max-width:320px}
.clabel{font-size:10px;font-weight:800;letter-spacing:.2em;color:var(--orl);text-transform:uppercase}
.join-url{font-size:11px;font-weight:600;color:var(--gold);word-break:break-all;text-align:center;opacity:.7}
.pcount{font-size:36px;font-weight:900;color:var(--or)}
.pcount-sub{font-size:12px;color:rgba(255,255,255,.4)}
.sb-list{display:flex;flex-direction:column;gap:7px;width:100%;max-height:220px;overflow-y:auto}
.sb-row{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.04);border-radius:10px;padding:8px 14px;border:1px solid rgba(147,51,234,.12)}
.sb-row.top1{border-color:var(--gold);background:rgba(255,215,0,.07)}
.sb-rank{font-size:16px;width:24px;text-align:center}
.sb-icon{font-size:18px}.sb-name{flex:1;font-size:14px;font-weight:700}
.sb-pts{font-family:'Secular One',sans-serif;font-size:20px;color:var(--gold)}
.sb-empty{font-size:13px;color:rgba(255,255,255,.3);text-align:center;padding:20px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:14px;
     cursor:pointer;font-family:'Heebo',sans-serif;font-weight:800;transition:all .18s}
.btn:active{transform:scale(.97)}
.btn-main{background:linear-gradient(135deg,var(--or),var(--orl));color:#fff;font-size:20px;padding:17px 52px;
           box-shadow:0 0 28px rgba(255,107,0,.4)}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 0 44px rgba(255,107,0,.5)}
.btn-ghost{background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);font-size:14px;padding:10px 22px;border:1px solid rgba(255,255,255,.12)}

/* ── GAME ── */
#game{display:none;position:fixed;inset:0;z-index:10;flex-direction:column;overflow:hidden}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;
        background:rgba(0,0,0,.4);border-bottom:1px solid rgba(255,255,255,.08);flex-wrap:wrap;gap:8px;flex-shrink:0}
.stats{display:flex;gap:16px}
.stat{font-size:12px;color:rgba(255,255,255,.45);font-weight:600;text-align:center}
.stat strong{color:var(--white);font-size:18px;display:block}
.mini-sb{display:flex;gap:6px;flex-wrap:wrap}
.mini-player{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border-radius:99px;padding:5px 12px;font-size:13px}
.mini-player.leader{background:rgba(255,215,0,.12);border:1px solid rgba(255,215,0,.3)}
.mini-icon{font-size:16px}.mini-name{font-weight:700}.mini-pts{color:var(--gold);font-weight:900}

/* ── WHEEL SCREEN ── */
#wheelScreen{position:absolute;inset:0;background:var(--dark);display:flex;flex-direction:column;
             align-items:center;justify-content:center;gap:20px;padding:20px 32px;overflow-y:auto}
.wheel-title{font-family:'Secular One',sans-serif;font-size:26px;color:var(--orl);text-align:center}
.wheel-area{display:flex;gap:40px;align-items:center;justify-content:center;width:100%;max-width:1100px;flex-wrap:wrap}
.wheel-col{display:flex;flex-direction:column;align-items:center;gap:16px;flex-shrink:0}
.wheel-wrap{position:relative;width:380px;height:380px}
#wheelCanvas{border-radius:50%;filter:drop-shadow(0 0 28px rgba(120,49,142,.5))}
.wheel-ptr{position:absolute;top:-14px;left:50%;transform:translateX(-50%);
           width:0;height:0;border-left:13px solid transparent;border-right:13px solid transparent;
           border-top:28px solid var(--or);filter:drop-shadow(0 0 8px var(--or))}
.wheel-result{font-family:'Secular One',sans-serif;font-size:20px;text-align:center;color:#fff;min-height:28px}
.wheel-result span{color:var(--orl)}
.btn-spin{padding:16px 52px;font-size:22px;font-weight:900;
          background:linear-gradient(135deg,var(--c1),#C084FC);border:none;border-radius:16px;
          color:#fff;cursor:pointer;box-shadow:0 0 28px rgba(147,51,234,.5);
          transition:all .2s;font-family:'Heebo',sans-serif}
.btn-spin:hover{transform:scale(1.05)}
.btn-spin:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* ── QUESTION SCREEN ── */
#qScreen{position:absolute;inset:0;background:var(--dark);display:none;
         flex-direction:column;padding:14px 24px 80px;gap:12px;overflow-y:auto}
.qhdr{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;flex-shrink:0}
.qbadge{padding:8px 18px;border-radius:20px;font-size:16px;font-weight:800}
.qcat{background:linear-gradient(135deg,var(--or),var(--orl));color:#fff}
.qpts{background:linear-gradient(135deg,var(--c1),#C084FC);color:#fff}
.qtimer{font-family:'Secular One',sans-serif;font-size:56px;color:var(--gold);
        text-shadow:0 0 18px rgba(255,207,14,.5);min-width:60px;text-align:center;line-height:1}
.qtimer.urg{color:var(--err);animation:tpulse .5s infinite alternate}
@keyframes tpulse{from{transform:scale(1)}to{transform:scale(1.1)}}

.qtext{font-family:'Secular One',sans-serif;font-size:clamp(22px,2.8vw,36px);
       line-height:1.4;text-align:center;padding:20px;
       background:var(--pan);border-radius:14px;border:1px solid rgba(147,51,234,.3)}

.qimg-wrap{max-width:700px;margin:0 auto;width:100%;border-radius:14px;overflow:hidden}
.qimg-wrap img{width:100%;max-height:280px;object-fit:cover;border-radius:14px;display:block}
.qimg-wrap.hidden{display:none}

.qanswers{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%}
.abtn{padding:16px;border:2px solid rgba(147,51,234,.25);border-radius:12px;background:var(--pan2);
      color:#fff;font-family:'Heebo',sans-serif;font-size:19px;font-weight:700;
      cursor:default;text-align:right;display:flex;align-items:center;gap:10px;min-height:62px;line-height:1.35}
.abtn .ltr{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;
           border-radius:8px;background:rgba(255,107,0,.15);color:var(--orl);font-size:15px;font-weight:900;flex-shrink:0}
.abtn.correct{border-color:var(--ok)!important;background:rgba(0,204,106,.12)!important;color:var(--ok)}
.abtn.wrong{border-color:var(--err)!important;opacity:.35}

/* מונה תשובות */
.answered-count{text-align:center;font-size:18px;color:rgba(255,255,255,.55);font-weight:700}
.answered-count b{color:var(--orl)}

/* כפתור חשיפה — גדול ובולט */
.reveal-big{width:100%;padding:22px;background:linear-gradient(135deg,var(--or),var(--orl));
            border:none;border-radius:16px;color:#fff;font-family:'Heebo',sans-serif;
            font-size:24px;font-weight:900;cursor:pointer;
            box-shadow:0 0 28px rgba(255,107,0,.4);transition:all .2s;letter-spacing:.03em}
.reveal-big:hover{transform:translateY(-2px);box-shadow:0 0 50px rgba(255,107,0,.7)}
.reveal-big.pulse{animation:revpulse 1s ease-in-out infinite}
@keyframes revpulse{0%,100%{box-shadow:0 0 28px rgba(255,107,0,.4)}50%{box-shadow:0 0 60px rgba(255,107,0,.9),0 0 90px rgba(255,107,0,.4)}}

/* כפתור הבא — מופיע אחרי חשיפה */
.next-big{display:none;width:100%;padding:20px;
          background:linear-gradient(135deg,var(--c1),#C084FC);
          border:none;border-radius:16px;color:#fff;font-family:'Heebo',sans-serif;
          font-size:22px;font-weight:900;cursor:pointer;
          box-shadow:0 0 28px rgba(147,51,234,.4);transition:all .2s}
.next-big:hover{transform:translateY(-2px)}
.next-big.visible{display:block;animation:fadeUp .4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* סטטיסטיקות */
.qstats{background:var(--pan);border-radius:12px;padding:14px;width:100%}
.qstats-title{font-size:12px;font-weight:800;color:var(--orl);margin-bottom:8px;letter-spacing:.1em;text-transform:uppercase}
.stat-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:13px}
.stat-lbl{width:20px;font-weight:800;color:#C084FC}
.stat-bar{flex:1;height:16px;background:rgba(255,255,255,.08);border-radius:5px;overflow:hidden}
.stat-fill{height:100%;border-radius:5px;transition:width 1s ease;background:linear-gradient(90deg,var(--or),var(--c1))}
.stat-fill.correct{background:linear-gradient(90deg,#00a855,var(--ok))}
.stat-cnt{width:36px;text-align:left;color:rgba(255,255,255,.45);font-size:12px}

/* הסבר */
.qexpl{background:linear-gradient(135deg,rgba(255,107,0,.08),rgba(147,51,234,.08));
       border:1px solid var(--or);border-radius:12px;padding:16px 20px;
       font-size:18px;line-height:1.7;width:100%}
.qexpl strong{color:var(--orl)}

/* ── SCORE SCREEN ── */
#scoreScreen{display:none;position:fixed;inset:0;z-index:40;background:var(--dark);
             overflow-y:auto;flex-direction:column;align-items:center;padding:30px 20px;gap:20px}
#scoreScreen.open{display:flex}
.score-title{font-family:'Secular One',sans-serif;font-size:clamp(28px,5vw,48px);font-weight:900;color:var(--gold)}
.final-grid{width:100%;max-width:500px;display:flex;flex-direction:column;gap:10px}
.final-row{display:flex;align-items:center;gap:14px;background:var(--pan);
           border:1px solid rgba(147,51,234,.2);border-radius:14px;padding:14px 20px}
.final-row.first{background:rgba(255,215,0,.07);border-color:rgba(255,215,0,.3)}
.final-rank{font-size:24px;width:36px;text-align:center}
.final-icon{font-size:26px}
.final-name{flex:1;font-size:18px;font-weight:800}
.final-pts{font-family:'Secular One',sans-serif;font-size:28px;font-weight:900;color:var(--gold)}
.score-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}

/* ── STATUS BAR ── */
.status-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(15,10,26,.97);
            backdrop-filter:blur(10px);border-top:1px solid rgba(147,51,234,.25);
            display:flex;align-items:center;justify-content:space-between;
            padding:8px 16px;gap:10px;z-index:50;flex-wrap:wrap}
.status-info{font-size:12px;color:rgba(255,255,255,.5)}
.status-info b{color:var(--orl)}
.status-btns{display:flex;gap:8px}
.bsm{padding:8px 16px;font-size:13px;font-weight:800;border:none;border-radius:9px;
     cursor:pointer;transition:all .2s;font-family:'Heebo',sans-serif}
.b-or{background:var(--or);color:#fff}
.b-dk{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.12)}
.bsm:hover{transform:scale(1.05)}

@media(max-width:700px){
  .wheel-wrap{width:260px;height:260px}
  .qanswers{grid-template-columns:1fr}
  .lobby-cols{flex-direction:column;align-items:center}
  .wheel-area{gap:20px}
}
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <div class="brand">HB Learning</div>
  <!-- ████ CUSTOMIZE ████ -->
  <h1>עבודה בטוחה עם חומ"ס</h1>
  <div class="lobby-cols">
    <div class="card">
      <div class="clabel">📱 סרקו להצטרף</div>
      <div id="qrcode"></div>
      <div class="join-url" id="joinUrl"></div>
      <div class="pcount" id="playerCount">0</div>
      <div class="pcount-sub">משתתפים מחוברים</div>
    </div>
    <div class="card">
      <div class="clabel">🏆 שחקנים</div>
      <div class="sb-list" id="lobbyScoreboard"><div class="sb-empty">ממתין לשחקנים...</div></div>
    </div>
  </div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
    <button class="btn btn-main" id="startBtn">▶ התחל משחק</button>
    <button class="btn btn-ghost" id="resetBtn">🗑️ אפס הכל</button>
  </div>
</div>

<!-- GAME -->
<div id="game">
  <!-- WHEEL -->
  <div id="wheelScreen">
    <div class="wheel-title" id="wheelHdr">🎡 סובבי את הגלגל!</div>
    <div class="wheel-area">
      <div class="wheel-col">
        <div class="wheel-wrap">
          <canvas id="wheelCanvas" width="380" height="380"></canvas>
          <div class="wheel-ptr"></div>
        </div>
        <div class="wheel-result" id="wheelResult"></div>
        <button class="btn-spin" id="spinBtn">🎡 סובב!</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:12px;min-width:260px">
        <div style="font-size:13px;font-weight:800;color:rgba(255,255,255,.4);letter-spacing:.12em;text-transform:uppercase">לוח ניקוד חי</div>
        <div class="sb-list" id="gameSidebar" style="max-height:320px"></div>
      </div>
    </div>
  </div>

  <!-- QUESTION -->
  <div id="qScreen">
    <div class="qhdr">
      <div style="display:flex;gap:10px;align-items:center">
        <span class="qbadge qcat" id="qCat">קטגוריה</span>
        <span class="qbadge qpts" id="qPts">נק׳</span>
      </div>
      <div style="flex:1;text-align:center;font-size:14px;color:rgba(255,255,255,.4);font-weight:700" id="qProgress"></div>
      <div class="qtimer" id="qTimer">20</div>
    </div>

    <div class="qtext" id="qText"></div>

    <div class="qimg-wrap hidden" id="qImgWrap">
      <img id="qImg" src="" alt="">
    </div>

    <div class="qanswers" id="qAnswers"></div>

    <div class="answered-count" id="answeredCount" style="display:none"></div>

    <button class="reveal-big" id="revealBtn">✅ חשוף תשובה</button>

    <div class="qstats" id="qStats" style="display:none">
      <div class="qstats-title">📊 התפלגות תשובות</div>
      <div id="statBars"></div>
    </div>

    <div class="qexpl" id="qExpl" style="display:none"></div>

    <button class="next-big" id="nextBtn">← המשך לשאלה הבאה</button>
  </div>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <div class="status-info">שחקנים: <b id="stPlayers">0</b> &nbsp;|&nbsp; שאלות: <b id="stQ">0</b></div>
    <div class="status-btns">
      <button class="bsm b-dk" onclick="openScoreScreen()">🏆 ניקוד</button>
      <button class="bsm b-dk" id="backLobbyBtn">🏠 לובי</button>
      <button class="bsm b-dk" id="resetGameBtn">🗑️</button>
    </div>
  </div>
</div>

<!-- SCORE SCREEN -->
<div id="scoreScreen">
  <div class="score-title">🏆 לוח ניקוד</div>
  <div class="final-grid" id="finalGrid"></div>
  <div class="score-btns">
    <button class="btn btn-main" onclick="closeScoreScreen()">← חזרה למשחק</button>
    <button class="btn btn-ghost" onclick="restartGame()">🔄 משחק חדש</button>
    <button class="btn btn-ghost" onclick="backToLobbyFn()">🏠 לובי</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
/* ════════════════════════════════════
   ████ CUSTOMIZE — Firebase Config ████
   ════════════════════════════════════ */
const FB_CONFIG = {
  apiKey:            "AIzaSyCnya7Hcz8yYKOv6GSJsWKjl0Fu2PDfxOg",
  authDomain:        "hazmat-game.firebaseapp.com",
  databaseURL:       "https://hazmat-game-default-rtdb.firebaseio.com",
  projectId:         "hazmat-game",
  storageBucket:     "hazmat-game.firebasestorage.app",
  messagingSenderId: "1057722628376",
  appId:             "1:1057722628376:web:c1c9ee1af53a8e7428c66d"
};
/* ════════════════════════════════════
   ████ CUSTOMIZE — נתיב ייחודי לכל פרויקט ████
   ════════════════════════════════════ */
const GAME_PATH = 'game_hazmat';
const TIMER_SEC = 20;

firebase.initializeApp(FB_CONFIG);
const db = firebase.database();

// QR
const _base = window.location.href.split('/').slice(0,-1).join('/');
const PLAYER_URL = _base + '/player.html';
const _qr = document.createElement('img');
_qr.style.cssText = 'width:144px;height:144px;border-radius:8px';
_qr.src = `https://api.qrserver.com/v1/create-qr-code/?size=144x144&data=${encodeURIComponent(PLAYER_URL)}&bgcolor=ffffff&color=0f0f1a&margin=2`;
document.getElementById('qrcode').appendChild(_qr);
document.getElementById('joinUrl').textContent = PLAYER_URL;

// State
let CATS=[], QS=[], players={};
let currentQ=null, timerInterval=null, answersListener=null;
let asked=0, usedQIds=new Set(), spinning=false, wheelAngle=0;
let revealed=false, playerAnswers={};

// ── AUTO-RESET ──
db.ref(GAME_PATH+'/game').remove();
db.ref(GAME_PATH+'/answers').remove();

// ── Load questions ──
fetch('questions.json').then(r=>r.json()).then(data=>{
  CATS=data.categories; QS=data.questions;
  document.getElementById('stQ').textContent='0/'+QS.length;
  buildWheel();
});

// ── Players listener ──
db.ref(GAME_PATH+'/players').on('value',snap=>{
  players=snap.val()||{};
  playerAnswers = {}; // reset on player change
  renderAll();
});

// ── Answers listener (persistent) ──
db.ref(GAME_PATH+'/answers').on('value',snap=>{
  playerAnswers=snap.val()||{};
  const cnt=Object.keys(playerAnswers).length;
  const tot=Object.keys(players).length;
  const el=document.getElementById('answeredCount');
  if(el&&currentQ&&!revealed){
    el.style.display='block';
    el.innerHTML=`<b>${cnt}</b> מתוך ${tot} ענו`;
  }
  const revBtn=document.getElementById('revealBtn');
  if(revBtn&&currentQ&&!revealed){
    if(cnt>0&&cnt>=tot&&tot>0){
      revBtn.classList.add('pulse');
      revBtn.textContent='✅ כולם ענו — חשוף תשובה!';
    } else if(cnt>0){
      revBtn.classList.add('pulse');
    }
  }
});

function renderAll(){
  const sorted=Object.entries(players).sort((a,b)=>(b[1].score||0)-(a[1].score||0));
  const cnt=sorted.length;
  document.getElementById('playerCount').textContent=cnt;
  document.getElementById('stPlayers').textContent=cnt;

  // לובי
  const lEl=document.getElementById('lobbyScoreboard');
  if(lEl) lEl.innerHTML=cnt===0
    ?'<div class="sb-empty">ממתין לשחקנים...</div>'
    :sorted.map(([,p],i)=>`
      <div class="sb-row ${i===0?'top1':''}">
        <span class="sb-rank">${['🥇','🥈','🥉'][i]||'#'+(i+1)}</span>
        <span class="sb-icon">${p.icon||'😊'}</span>
        <span class="sb-name">${p.name||'שחקן'}</span>
        <span class="sb-pts">${p.score||0}</span>
      </div>`).join('');

  // סייד בר במשחק
  const gEl=document.getElementById('gameSidebar');
  if(gEl) gEl.innerHTML=cnt===0
    ?'<div class="sb-empty">אין שחקנים</div>'
    :sorted.map(([,p],i)=>`
      <div class="sb-row ${i===0?'top1':''}">
        <span class="sb-rank">${['🥇','🥈','🥉'][i]||'#'+(i+1)}</span>
        <span class="sb-icon">${p.icon||'😊'}</span>
        <span class="sb-name">${p.name||'שחקן'}</span>
        <span class="sb-pts">${p.score||0}</span>
      </div>`).join('');

  // לוח ניקוד מלא
  const fEl=document.getElementById('finalGrid');
  if(fEl) fEl.innerHTML=sorted.map(([,p],i)=>`
    <div class="final-row ${i===0?'first':''}">
      <span class="final-rank">${['🥇','🥈','🥉'][i]||`${i+1}.`}</span>
      <span class="final-icon">${p.icon||'😊'}</span>
      <span class="final-name">${p.name||'שחקן'}</span>
      <span class="final-pts">${p.score||0}</span>
    </div>`).join('');
}

// ── WHEEL ──
const CAT_COLORS=['#2E81C5','#78318E','#1a6b3a','#7a3b0e','#b5451b','#1a5276','#4a235a','#145a32'];

function buildWheel(){
  drawWheel(wheelAngle);
}

function drawWheel(angle){
  const canvas=document.getElementById('wheelCanvas');
  if(!canvas||!CATS.length) return;
  const ctx=canvas.getContext('2d');
  const n=CATS.length, slice=(2*Math.PI)/n;
  const cx=canvas.width/2, cy=canvas.height/2, r=cx-4;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  CATS.forEach((cat,i)=>{
    const s=angle+i*slice-Math.PI/2, e=s+slice;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,s,e); ctx.closePath();
    ctx.fillStyle=CAT_COLORS[i%CAT_COLORS.length]; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.15)'; ctx.lineWidth=2; ctx.stroke();
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(s+slice/2);
    ctx.textAlign='right'; ctx.fillStyle='#fff';
    ctx.font=`bold ${Math.min(15,110/n)}px Heebo,sans-serif`;
    ctx.fillText(cat.length>10?cat.slice(0,10)+'…':cat, r-10, 6);
    ctx.restore();
  });
}

document.getElementById('spinBtn').onclick=()=>{
  if(spinning||!CATS.length) return;
  const pool=QS.filter(q=>!usedQIds.has(q.id));
  if(!pool.length){ alert('כל השאלות נגמרו!'); return; }
  spinning=true;
  document.getElementById('spinBtn').disabled=true;
  document.getElementById('wheelResult').innerHTML='';
  const label=document.getElementById('wheelHdr');
  label.textContent='מסתובב...';

  const chosen=Math.floor(Math.random()*CATS.length);
  const slice=(2*Math.PI)/CATS.length;
  const target=-(chosen*slice)+Math.PI+Math.random()*slice*0.6;
  const total=(4+Math.random()*3)*2*Math.PI+target;
  const t0=performance.now(), dur=3500, a0=wheelAngle;

  (function frame(now){
    const t=Math.min((now-t0)/dur,1);
    const ease=1-Math.pow(1-t,4);
    wheelAngle=a0+total*ease;
    drawWheel(wheelAngle);
    if(t<1){ requestAnimationFrame(frame); return; }
    spinning=false;
    document.getElementById('wheelResult').innerHTML=`נבחר: <span>${CATS[chosen]}</span>`;
    label.textContent='🎯 '+CATS[chosen];
    setTimeout(()=>launchQuestion(chosen),900);
  })(performance.now());
};

function launchQuestion(catIndex){
  const pool=QS.filter(q=>q.catIndex===catIndex&&!usedQIds.has(q.id));
  if(!pool.length){
    document.getElementById('wheelHdr').textContent='🚫 כל השאלות בקטגוריה זו נגמרו!';
    document.getElementById('spinBtn').disabled=false;
    spinning=false; return;
  }
  const q=pool[Math.floor(Math.random()*pool.length)];
  usedQIds.add(q.id); asked++;
  document.getElementById('stQ').textContent=asked+'/'+QS.length;
  currentQ=q; revealed=false;

  db.ref(GAME_PATH+'/game/current').set({
    id:q.id, catIndex, catName:CATS[catIndex],
    q:q.q, opts:q.opts, image:q.image||null, state:'question', ts:Date.now()
  });
  db.ref(GAME_PATH+'/answers').remove();
  openQScreen(q,catIndex);
}

function openQScreen(q,catIndex){
  switchScreen('qScreen');
  document.getElementById('qCat').textContent=CATS[catIndex];
  document.getElementById('qPts').textContent='שאלה '+(asked);
  document.getElementById('qText').textContent=q.q;
  document.getElementById('qProgress').textContent=asked+' מתוך '+QS.length;

  const wrap=document.getElementById('qImgWrap');
  if(q.image){ document.getElementById('qImg').src=q.image; wrap.classList.remove('hidden'); }
  else { wrap.classList.add('hidden'); }

  const letters=['א','ב','ג','ד'];
  document.getElementById('qAnswers').innerHTML=q.opts.map((opt,i)=>`
    <div class="abtn" id="abtn-${i}">
      <span class="ltr">${letters[i]}</span> ${opt}
    </div>`).join('');

  document.getElementById('answeredCount').style.display='none';
  document.getElementById('qStats').style.display='none';
  document.getElementById('qExpl').style.display='none';
  document.getElementById('nextBtn').classList.remove('visible');
  const rb=document.getElementById('revealBtn');
  rb.style.display='block'; rb.classList.remove('pulse');
  rb.textContent='✅ חשוף תשובה';

  startTimer();
}

function startTimer(){
  let sec=TIMER_SEC;
  const fill_not_used=null; // no bar in host, just number
  const timerEl=document.getElementById('qTimer');
  timerEl.textContent=sec; timerEl.className='qtimer';
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    sec--;
    timerEl.textContent=sec;
    if(sec<=10) timerEl.className='qtimer urg';
    if(sec<=0) clearInterval(timerInterval);
  },1000);
}

document.getElementById('revealBtn').onclick=()=>{
  if(revealed) return;
  revealed=true;
  clearInterval(timerInterval);
  const q=currentQ;
  const rb=document.getElementById('revealBtn');
  rb.style.display='none'; rb.classList.remove('pulse');
  document.getElementById('answeredCount').style.display='none';

  // הדגשת תשובה נכונה
  document.querySelectorAll('.abtn').forEach((b,i)=>{
    if(i===q.correct) b.classList.add('correct');
    else b.classList.add('wrong');
  });

  // סטטיסטיקות
  const answers=playerAnswers;
  const counts=(q.opts||[]).map((_,i)=>Object.values(answers).filter(a=>(typeof a==='number'?a:a?.answer)===i).length);
  const total=Object.values(answers).length||1;
  const letters=['א','ב','ג','ד'];
  document.getElementById('statBars').innerHTML=counts.map((c,i)=>`
    <div class="stat-row">
      <div class="stat-lbl">${letters[i]}</div>
      <div class="stat-bar"><div class="stat-fill ${i===q.correct?'correct':''}" style="width:${Math.round(c/total*100)}%"></div></div>
      <div class="stat-cnt">${c}</div>
    </div>`).join('');
  document.getElementById('qStats').style.display='block';

  // הסבר
  if(q.inst||q.ans){
    document.getElementById('qExpl').innerHTML=`<strong>💡 הסבר:</strong> ${q.ans||''}${q.inst?'<br><span style="opacity:.75;font-size:16px">'+q.inst+'</span>':''}`;
    document.getElementById('qExpl').style.display='block';
  }

  // ניקוד אוטומטי
  db.ref(GAME_PATH+'/game/current/state').set('reveal');
  db.ref(GAME_PATH+'/game/current/correct').set(q.correct);
  Object.entries(answers).forEach(([pid,ans])=>{
    const ansIdx=typeof ans==='number'?ans:ans?.answer;
    if(ansIdx===q.correct&&players[pid]){
      db.ref(GAME_PATH+`/players/${pid}`).update({score:(players[pid].score||0)+100});
    }
  });

  // כפתור הבא
  setTimeout(()=>{
    document.getElementById('nextBtn').classList.add('visible');
    document.getElementById('nextBtn').scrollIntoView({behavior:'smooth',block:'nearest'});
  },400);
};

document.getElementById('nextBtn').onclick=()=>{
  db.ref(GAME_PATH+'/game/current').remove();
  switchScreen('wheelScreen');
  const left=QS.length-asked;
  document.getElementById('wheelHdr').textContent=left>0?`עוד ${left} שאלות — סובבי!`:'כל הכבוד, סיימתם!';
  document.getElementById('spinBtn').disabled=false;
  document.getElementById('wheelResult').innerHTML='';
  db.ref(GAME_PATH+'/game/state').set('wheel');
};

function switchScreen(id){
  ['wheelScreen','qScreen'].forEach(s=>{
    const el=document.getElementById(s);
    if(el) el.style.display=el.id===id?'flex':'none';
    if(el&&el.id===id) el.style.flexDirection='column';
  });
}

// ── Score Screen ──
function openScoreScreen(){ renderAll(); document.getElementById('scoreScreen').classList.add('open'); }
function closeScoreScreen(){ document.getElementById('scoreScreen').classList.remove('open'); }
function backToLobbyFn(){
  document.getElementById('scoreScreen').classList.remove('open');
  document.getElementById('game').style.display='none';
  document.getElementById('lobby').style.display='flex';
}
function restartGame(){
  db.ref(GAME_PATH+'/answers').remove();
  db.ref(GAME_PATH+'/game').remove();
  Object.keys(players).forEach(pid=>db.ref(GAME_PATH+`/players/${pid}`).update({score:0}));
  asked=0; usedQIds.clear(); revealed=false;
  document.getElementById('stQ').textContent='0/'+QS.length;
  document.getElementById('scoreScreen').classList.remove('open');
  switchScreen('wheelScreen');
  document.getElementById('spinBtn').disabled=false;
  document.getElementById('wheelHdr').textContent='🎡 סובבי את הגלגל!';
  document.getElementById('wheelResult').innerHTML='';
}

document.getElementById('startBtn').onclick=()=>{
  document.getElementById('lobby').style.display='none';
  document.getElementById('game').style.display='flex';
  switchScreen('wheelScreen');
  db.ref(GAME_PATH+'/game/state').set('wheel');
};
document.getElementById('backLobbyBtn').onclick=backToLobbyFn;
document.getElementById('resetGameBtn').onclick=()=>{
  if(!confirm('למחוק את כל השחקנים והניקוד?')) return;
  db.ref(GAME_PATH+'/players').remove();
  db.ref(GAME_PATH+'/answers').remove();
  db.ref(GAME_PATH+'/game').remove();
  asked=0; usedQIds.clear();
};
document.getElementById('resetBtn').onclick=()=>{
  if(!confirm('למחוק הכל?')) return;
  db.ref(GAME_PATH+'/players').remove();
  db.ref(GAME_PATH+'/answers').remove();
  db.ref(GAME_PATH+'/game').remove();
  asked=0; usedQIds.clear();
};
</script>
